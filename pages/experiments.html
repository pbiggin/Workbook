<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Experiments</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main>
      <a href="../index.html">
        <div class="home-icon"></div>
      </a>
      <section class="workbook-content">
        <div class="ball-container">
          <div
            class="crumple-ball"
            id="ball1"
            onclick="showOverlay(this, 1)"
            title="Week 1 activity"
          ></div>
          <div
            class="crumple-ball"
            id="ball2"
            onclick="showOverlay(this, 2)"
            title="Week 2 activity"
          ></div>
          <div
            class="crumple-ball"
            id="ball3"
            onclick="showOverlay(this, 3)"
            title="week 3 activity"
          ></div>
          <div
            class="crumple-ball"
            id="ball4"
            onclick="showOverlay(this, 4)"
            title="week 4 activity"
          ></div>
        </div>
        <div id="overlay1" onclick="hideOverlay(1)">
          <div class="overlay-content">
            <h1> test </h1>
          </div>
        </div>
        <div id="overlay2" onclick="hideOverlay(2)">
          <div class="overlay-content">
            <h1> test </h1>
          </div>
        </div>
        <div id="overlay3" onclick="hideOverlay(3)">
          <div class="overlay-content">
             <h1> test </h1>
          </div>
        </div>
        <div id="overlay4" onclick="hideOverlay(4)">
          <div class="overlay-content">
             <h1> test </h1>
          </div>
        </div>
      </section>

      <!-- THIS SCRIPT WAS GENERATED BY Copilot, based off html & css elements I coded -->
      <script>
        let activeBall = null;
        let activeOverlay = null;
        function showOverlay(ball, id) {
          if (activeBall === ball) {
            hideOverlay(id);
            return;
          }
          if (activeBall) activeBall.classList.remove("open");
          if (activeOverlay) activeOverlay.style.display = "none";
          activeBall = ball;
          activeOverlay = document.getElementById("overlay" + id);
          ball.classList.add("open");
          activeOverlay.style.display = "flex";
        }
        function hideOverlay(id) {
          if (activeBall) activeBall.classList.remove("open");
          activeBall = null;
          document.getElementById("overlay" + id).style.display = "none";
          activeOverlay = null;
        }
      </script>
    </main>
  </body>
</html>
