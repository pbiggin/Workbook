<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Human interface: gesture</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main>
      <a href="../index.html">
        <div class="home-icon"></div>
      </a>
      <a href="../pages/workbook.html">
        <div class="icon center">
          <img
            src="../images/week1-orb.webp"
            style="width: 100%"
            alt="human computer activity"
          />
          <p>back</p>
        </div>
      </a>
      <p class="center">text about activity</p>

      <div class="map">
        <img
          src="../images/week1-sketch.webp"
          style="width: 100%"
          alt="human computer activity"
        />

        <svg
          class="click-map"
          width="100%"
          height="100%"
          viewBox="0 0 100% 100%"
        >
          <rect
            class="tooltip"
            x="17%"
            y="17%"
            width="15px"
            height="15px"
            data-popup="The gestural object is an interface that plays sounds, music and incoming stimuli based off of the direction it recieves the stimuli from. 
            it plays audio into all directions possible"
          ></rect>

          <rect
            class="tooltip"
            x="46%"
            y="10%"
            width="15px"
            height="15px"
            data-popup="The interface is muted on covered parts of its surface "
          ></rect>

          <rect
            class="tooltip"
            x="77%"
            y="13%"
            width="15px"
            height="15px"
            data-popup="This is the green circle info!"
          ></rect>

          <rect
            class="tooltip"
            x="80%"
            y="60%"
            width="15px"
            height="15px"
            data-popup="the orb!"
          ></rect>

          <rect
            class="tooltip"
            x="30%"
            y="70%"
            width="15px"
            height="15px"
            data-popup="This is the green circle info!"
          ></rect>
        </svg>
        <div id="popup" hidden>This is a pop-up message!</div>
      </div>
    </main>

    <script>
      const popup = document.getElementById("popup");
      const circles = document.querySelectorAll(".tooltip");
      const container = document.getElementById('map')

      circles.forEach((circle) => {
        
        circle.addEventListener("mouseenter", (event) => {
          
          const content = circle.dataset.popup;
          popup.textContent = content;
          popup.style.display = "block";
        });
        
        circle.addEventListener("mouseleave", () => {
          popup.style.display = "none";
        });
      });
    </script>
  </body>
</html>
